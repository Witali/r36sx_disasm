# Pico-286 disk image bindings for the R36SX native port.
# Paths are relative to this directory unless an absolute path is used.

# CPU speed knob for this port. The value maps to exec86 loops per
# millisecond-like host loop; 32.768 keeps the previous hard-coded behavior.
[cpu]
cpu_mhz=32.768

# Boot mode:
# normal: attach configured disks and boot DOS.
# bios_prompt: leave disks detached at INT 19h to stop at the Turbo XT BIOS prompt.
[boot]
boot_mode=normal
# Boot drive order. Supported names: fdd0, fdd1, hdd0, hdd1.
# Use boot_order=rom to keep the embedded ROM BIOS boot path.
boot_order=fdd0,hdd0

# Emulated memory sizes in KB, capped by the compiled buffers.
# Allowed ranges:
# conventional_kb: 64..640, reported through the BIOS Data Area.
# upper_kb: 0..176, limits XMS UMB allocations from D000:0000 upward.
# extended_kb: 0..4096, reported by INT 15h AH=88h.
# xms_kb: 0..4096, limits the built-in XMS handler.
[memory]
conventional_kb=640
upper_kb=176
extended_kb=64
xms_kb=4096

# Screenshot output format. Supported values: png, bmp.
[screenshot]
screenshot_format=png

# Disk image I/O cache.
# disk_cache_buffer_kb is allocated per open disk image file.
# fflush runs after disk_cache_flush_sectors dirty sectors, or after
# disk_cache_flush_ms milliseconds since the latest cached write.
[disk_cache]
disk_cache_buffer_kb=256
disk_cache_flush_sectors=16
disk_cache_flush_ms=2000

# Optional runtime profiling written to pico_286.log.
[profiling]
profiling_enabled=1
profiling_log_ms=10000

# On-screen app statistics. Fn+D-pad Down toggles display when enabled.
[stats]
app_stats_enabled=1

# BIOS drive 00h, DOS A:
[floppy_drives]
fdd0=FreeDOS1.img

# BIOS drive 01h, DOS B:
fdd1=sopwith.img

# BIOS drive 80h, DOS C:
[hard_drives]
hdd0=hdd.img
hdd0_geometry=65,16,63

# BIOS drive 81h, DOS D:
hdd1=hdd2.img
hdd1_geometry=65,16,63
