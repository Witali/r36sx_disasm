# Pico-286 configuration for the R36SX native port.
# Paths are relative to this directory unless an absolute path is used.
# Disk drive values are file names loaded from image_dir.

# CPU compatibility model: 8086, 80286, or 80386.
# Higher-generation instructions are accepted only when the selected model
# supports them; unsupported opcodes raise INT 6.
# cpu_mode=real is the normal PC boot mode. cpu_mode=protected is parsed for
# experiments, but full protected-mode execution is still WIP.
# CPU speed knob for this port. The value maps to exec86 loops per
# millisecond-like host loop; 32.768 keeps the previous hard-coded behavior.
[cpu]
cpu_model=80386
cpu_mode=real
cpu_mhz=10.0

# Main loop timing.
# target_fps sets the frame budget used by adaptive exec86 quantum control.
[timing]
target_fps=60

# Scaling filter used when the DOS image is resized.
# Supported scaling_filter values: nearest, bilinear.
# keyboard_mode=normal resizes the DOS image above the keyboard.
# keyboard_mode=overlay draws the keyboard over the DOS image.
[video]
scaling_filter=nearest
keyboard_mode=normal

# Emulated audio devices mixed into the output stream.
# The built-in PC speaker/beeper is always enabled.
[audio]
audio_sample_rate=44100
audio_adlib=1
audio_sound_blaster=1
audio_cms=1
audio_sn76489=0
audio_mpu401=0
audio_disney=1
audio_covox=1

# Boot mode:
# normal: attach configured disks and boot DOS.
# bios_prompt: leave disks detached at INT 19h to stop at the Turbo XT BIOS prompt.
[boot]
boot_mode=normal
# Boot drive order. Supported names: fdd0, fdd1, hdd0, hdd1.
# Use boot_order=rom to keep the embedded ROM BIOS boot path.
boot_order=hdd0,fdd0

# BIOS ROM provider: normal or test386.
# test_bios_rom is resolved relative to this config file.
[bios]
bios=normal
test_bios_rom=test386.bin

# Emulated memory sizes in KB, capped by the compiled buffers.
# Allowed ranges:
# conventional_kb: 64..640, reported through the BIOS Data Area.
# upper_kb: 0..176, limits XMS UMB allocations from D000:0000 upward.
# extended_kb: 0..4096, reported by INT 15h AH=88h.
# xms_kb: 0..4096, limits the built-in XMS handler.
[memory]
conventional_kb=640
upper_kb=176
extended_kb=64
xms_kb=4096

# Screenshot output format. Supported values: png, bmp.
[screenshot]
screenshot_format=png

# Disk image I/O cache.
# disk_cache_buffer_kb is allocated per open disk image file.
# fflush runs after disk_cache_flush_sectors dirty sectors, or after
# disk_cache_flush_ms milliseconds since the latest cached write.
[disk_cache]
disk_cache_buffer_kb=256
disk_cache_flush_sectors=16
disk_cache_flush_ms=2000

# Optional runtime profiling written to pico_286.log.
[profiling]
profiling_enabled=0
profiling_log_ms=10000

# On-screen app statistics. Fn+D-pad Down toggles display when enabled.
[stats]
app_stats_enabled=1

# Host filesystem directory exposed to DOS as network drive H:.
# Relative paths are resolved next to pico_286.conf.
# DOS must run MAPDRIVE.COM after boot; CONFIG.SYS needs LASTDRIVE=H or higher.
[host_drive]
host_drive_path=host

# Directory with disk images used by short file names below.
# Relative paths are resolved next to pico_286.conf.
[disk_images]
image_dir=images

# BIOS drive 00h, DOS A:
[floppy_drives]
fdd0=FreeDOS1.img

# BIOS drive 01h, DOS B:
fdd1=sopwith.img

# BIOS drive 80h, DOS C:
[hard_drives]
hdd0=hdd.hdd
hdd0_geometry=65,16,63

# BIOS drive 81h, DOS D:
hdd1=hdd2.hdd
hdd1_geometry=65,16,63
