[sdl]
fullscreen=false
fulldouble=false
fullresolution=640x480
windowresolution=640x480
output=surface
autolock=false
sensitivity=100
waitonerror=false
priority=higher,normal
mapperfile=mapper.txt
usescancodes=false

[dosbox]
language=
machine=vgaonly
captures=capture
memsize=8

[render]
frameskip=3
aspect=false
scaler=none

[cpu]
core=normal
cputype=auto
cycles=max
cycleup=5000
cycledown=5000

[mixer]
nosound=true
rate=22050
blocksize=1024
prebuffer=10

[midi]
mpu401=none
mididevice=none

[sblaster]
sbtype=none
sbbase=220
irq=7
dma=1
hdma=5
mixer=false
oplmode=none
oplemu=default
oplrate=22050

[gus]
gus=false

[speaker]
pcspeaker=false
pcrate=22050
tandy=off
tandyrate=22050
disney=false

[joystick]
joysticktype=none
timed=true
autofire=false
swap34=false
buttonwrap=false

[serial]
serial1=disabled
serial2=disabled
serial3=disabled
serial4=disabled

[dos]
xms=true
ems=false
umb=false
keyboardlayout=none

[ipx]
ipx=false

[autoexec]
mount c /mnt/sdcard/MIPS_NATIVE/dosbox_r36sx/drive_c
c:
echo R36SX DOSBox direct video test
ver
dir
