# Tiny MC runtime config
# Lines use key=value. Blank lines and text after # are ignored.

# Preferred TrueType font. Use another file from /mnt/sdcard/MIPS_NATIVE/common/fonts
# to change the UI font without rebuilding tiny_mc.
font=/mnt/sdcard/MIPS_NATIVE/common/fonts/JetBrainsMonoNL-Regular.ttf

# Header/path/footer text size.
small_px=12

# File-list text size.
large_px=19

# File-list row height. Keep this at least large_px + 3.
list_row_h=22
