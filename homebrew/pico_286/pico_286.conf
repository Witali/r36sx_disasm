# Pico-286 disk image bindings for the R36SX native port.
# Paths are relative to this directory unless an absolute path is used.

# CPU compatibility model: 8086, 80286, or 80386.
# Higher-generation instructions are accepted only when the selected model
# supports them; unsupported opcodes raise INT 6.
# cpu_mode=real is the normal PC boot mode. cpu_mode=protected is experimental;
# the guest still starts in real mode and may enter protected mode via CR0/LMSW.
# CPU speed knob maps to exec86 loops per host scheduler slice.
[cpu]
cpu_model=80386
cpu_mode=real
cpu_mhz=32.768

# Main loop timing.
# target_fps sets the frame budget used by adaptive exec86 quantum control.
[timing]
target_fps=60

# Scaling filter used when the DOS image is resized.
# Supported values: nearest, bilinear.
[video]
scaling_filter=nearest

# Boot mode:
# normal: attach configured disks and boot DOS.
# bios_prompt: leave disks detached at INT 19h to stop at the Turbo XT BIOS prompt.
[boot]
boot_mode=normal
# Boot drive order. Supported names: fdd0, fdd1, hdd0, hdd1.
# Use boot_order=rom to keep the embedded ROM BIOS boot path.
boot_order=fdd0,hdd0

# BIOS ROM provider: normal or test386.
# test_bios_rom is resolved relative to this config file.
[bios]
bios=normal
test_bios_rom=test386.bin

# Emulated memory sizes in KB.
# conventional_kb is reported through the BIOS Data Area.
# extended_kb is reported by INT 15h AH=88h.
# upper_kb limits XMS UMB allocations from D000:0000 upward.
# xms_kb limits the built-in XMS handler.
[memory]
conventional_kb=640
upper_kb=176
extended_kb=64
xms_kb=4096

# Screenshot output format. Supported values: png, bmp.
[screenshot]
screenshot_format=png

# Disk image I/O cache.
# disk_cache_buffer_kb is allocated per open disk image file.
# fflush runs after disk_cache_flush_sectors dirty sectors, or after
# disk_cache_flush_ms milliseconds since the latest cached write.
[disk_cache]
disk_cache_buffer_kb=64
disk_cache_flush_sectors=4
disk_cache_flush_ms=2000

# Optional runtime profiling written to pico_286.log.
[profiling]
profiling_enabled=0
profiling_log_ms=5000

# On-screen app statistics. Fn+D-pad Down toggles display when enabled.
[stats]
app_stats_enabled=1

# Host filesystem directory exposed to DOS as network drive H:.
# Relative paths are resolved next to pico_286.conf.
# DOS must run MAPDRIVE.COM after boot; CONFIG.SYS needs LASTDRIVE=H or higher.
[host_drive]
host_drive_path=host

# BIOS drive 00h, DOS A:
[floppy_drives]
fdd0=images/FreeDOS1.img

# BIOS drive 01h, DOS B:
fdd1=images/sopwith.img

# BIOS drive 80h, DOS C:
[hard_drives]
hdd0=images/hdd.img
hdd0_geometry=65,16,63

# BIOS drive 81h, DOS D:
hdd1=images/hdd2.img
hdd1_geometry=65,16,63
