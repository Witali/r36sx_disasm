# Pico-286 disk image bindings for the R36SX native port.
# Paths are relative to this directory unless an absolute path is used.

# CPU speed knob for this port. The value maps to exec86 loops per
# millisecond-like host loop; 32.768 keeps the previous hard-coded behavior.
cpu_mhz=32.768

# Boot mode:
# normal: attach configured disks and boot DOS.
# bios_prompt: leave disks detached at INT 19h to stop at the Turbo XT BIOS prompt.
boot_mode=normal

# BIOS drive 00h, DOS A:
fdd0=FreeDOS1.img

# BIOS drive 01h, DOS B:
fdd1=sopwith.img

# BIOS drive 80h, DOS C:
hdd0=hdd.img

# BIOS drive 81h, DOS D:
hdd1=hdd2.img
